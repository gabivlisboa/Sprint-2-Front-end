<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">

    <title>Smart Cam</title>
</head>
<body>
     
    <header>
        <nav class="config">
     <button id="themeBtn" class="light-btn">

        <i class="bx bx-sun" style="color:#807a7a;"></i>
            </button>

            <button id="abrir-config">
               <img src="./img/Vector.png" alt="">
            </button>
        </nav>
    </header>

   <section class="modal-tirar-foto">
         <img src="./img/imagem-fundo.png" alt="Tela de fundo" class="tela-fundo">
        <div class="box-modal">

            <img src="./img/modo-noturno.png" alt="Modo Noturno">

            <h2>Melhorar qualidade noturna?</h2>
            <p>A IA detectou baixa luminosidade.
                Ative o modo otimizado para fotos
                mais nítidas e claras.</p>
            <button id="ativar-otimizacao"><a href="">Sim</a></button>
            <button id="ignorar"><a href="">Agora não</a></button>

        </div>
    </section>

    <div class="modos">

    <button class="modo ativo">
        Retrato
    </button>

    <button class="modo">
        Foto
    </button>

    <button class="modo">
        Vídeo
    </button>

</div>

<section class="funcoes">
    <button><img src="./img/foto-galeria.png" alt="Foto Galeria"></button>
    <button><img src="./img/Flash modo claro.png" alt="Foto Flash"></button>
    <button id="tirar-foto"></button>
    <button><img src="./img/Timer modo claro.png" alt="Timer"></button>
    <button> <img src="./img/Botao girar camera modo claro.png" alt="Virar Camera"></button>

</section>


</body>
</html>
