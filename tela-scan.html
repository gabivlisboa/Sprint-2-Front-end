<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cam</title>
</head>
<body>
    
    <header>
        <nav class="config">
    <button id="abrir-config" onclick="window.location.href='opçoes-claro.html'"><img src="./img/Vector.png" alt="">
    </button>
        </nav>
    </header>
    <section class="scan">
         <img src="./img/imagem-fundo-scan.png" alt="Tela de fundo" class="tela-fundo">

    </section>
    <div class="resolucao">

    <button class="modo-scan"> 
        0.5
    </button>

    <button class="modo-scan-ativo">
        1
    </button>

    <button class="modo-scan">
        2
    </button>

</div>

    <div class="modos">

    <button class="modo ativo">
        Retrato
    </button>

    <button class="modo">
        Video
    </button>

    <button class="modo">
        Foto
    </button>

</div>

<section class="funcoes">
    <button><img src="./img/foto-galeria.png" alt="Foto Galeria"></button>
    <button><img src="./img/Flash modo claro.png" alt="Foto Flash"></button>
    <button id="tirar-foto"></button>
    <button><img src="./img/Timer modo claro.png" alt="Timer"></button>
    <button> <img src="./img/Botao girar camera modo claro.png" alt="Virar Camera"></button>

</section>


</body>
</html>
